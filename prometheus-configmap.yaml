apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'devops-psu'
        static_configs:
          - targets: ['service-devops.devops-psu.svc.cluster.local:12345']
kind: ConfigMap
metadata:
  name: prometheus-config
